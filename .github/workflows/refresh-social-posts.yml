name: Refresh social posts

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-social-posts
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh latest original posts
        run: node scripts/update-social-posts.mjs

      - name: Commit feed changes
        id: commit
        run: |
          if git diff --quiet -- public/social-posts.json; then
            echo "Social posts are already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/social-posts.json
          git commit -m "Refresh latest social posts"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy refreshed feed
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
