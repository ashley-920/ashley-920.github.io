name: Refresh social posts

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      linkedin_url:
        description: "Optional: URL of a new original LinkedIn post"
        required: false
        type: string
      linkedin_date:
        description: "Optional: publication date in YYYY-MM-DD format"
        required: false
        type: string
      linkedin_text:
        description: "Optional: post text or a concise first-paragraph excerpt"
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-social-posts
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh latest original posts
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          LINKEDIN_MANUAL_URL: ${{ inputs.linkedin_url }}
          LINKEDIN_MANUAL_DATE: ${{ inputs.linkedin_date }}
          LINKEDIN_MANUAL_TEXT: ${{ inputs.linkedin_text }}
        run: node scripts/update-social-posts.mjs

      - name: Commit feed changes
        id: commit
        run: |
          if git diff --quiet -- public/social-posts.json; then
            echo "Social posts are already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/social-posts.json
          git commit -m "Refresh latest social posts"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy refreshed feed
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
